name: CI Workflow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container: python:3.9-slim

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run commands
        run: |
          python --version
          pip --version
